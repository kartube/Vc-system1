<!DOCTYPE html>
<html>
<head>
<title>VC Login</title>
</head>

<body style="background:#111;color:white;text-align:center;font-family:Arial">

<h1>🎤 Voice Chat</h1>

<input id="name" placeholder="Enter name" style="padding:10px">
<br><br>

<button onclick="login()" style="padding:10px 20px">
ENTER
</button>

<p id="status"></p>

<script>
async function login(){

    const name = document.getElementById("name").value;

    if(!name){
        alert("Enter name");
        return;
    }

    try {

        document.getElementById("status").innerText = "Logging in...";

        const res = await fetch("/login/" + name);
        const data = await res.json();

        if(!data.userId){
            document.getElementById("status").innerText = "Login failed";
            return;
        }

        localStorage.setItem("userId", data.userId);
        localStorage.setItem("name", name);

        document.getElementById("status").innerText = "Success ✔";

        setTimeout(() => {
            window.location.href = "/room.html";
        }, 800);

    } catch (err) {
        console.log(err);
        document.getElementById("status").innerText = "Server error";
    }
}
</script>

</body>
</html>
