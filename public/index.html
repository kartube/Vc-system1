<!DOCTYPE html>
<html>
<head>
<title>KIMIC VC</title>
</head>

<body style="background:#0f0f12;color:white;text-align:center;font-family:Arial">

<h1>🎤 KIMIC Voice Chat</h1>

<input id="name" placeholder="Enter your name" style="padding:10px">
<br><br>
<button onclick="login()" style="padding:10px 20px">Enter</button>

<p id="status"></p>

<script>
async function login(){

    const name = document.getElementById("name").value;

    if(!name) return alert("Enter name");

    const res = await fetch("/login/" + name);
    const data = await res.json();

    localStorage.setItem("userId", data.userId);
    localStorage.setItem("name", name);

    document.getElementById("status").innerText = "Logged in...";

    setTimeout(()=>{
        window.location = "/room.html";
    },1000);
}
</script>

</body>
</html>
