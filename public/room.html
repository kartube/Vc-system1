<!DOCTYPE html>
<html>
<head>
<title>Room</title>
</head>

<body style="background:#0f0f12;color:white;text-align:center;font-family:Arial">

<h2>🎧 Voice Room</h2>

<input id="room" placeholder="Room Code" style="padding:10px">
<br><br>

<button onclick="join()" style="padding:10px 20px">Join Room</button>

<p id="status"></p>

<script src="/socket.io/socket.io.js"></script>
<script src="/client.js"></script>

<script>
function join(){

    const room = document.getElementById("room").value;
    const userId = localStorage.getItem("userId");

    if(!room) return alert("Enter room");

    document.getElementById("status").innerText =
        "Joining...";

    startVoice(room, userId);
}
</script>

</body>
</html>
