<!DOCTYPE html>
<html>
<head>
<title>Room</title>
</head>

<body style="background:#111;color:white;text-align:center">

<h2>🎤 Voice Room</h2>
<p id="status">Connecting...</p>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let localStream;
let peers = {};
let myId = Math.random().toString(36).substr(2,9);

function getRoom(){
    const url = new URL(window.location.href);
    return url.searchParams.get("room");
}

async function start(){

    const room = getRoom();

    if(!room){
        document.getElementById("status").innerText = "No room!";
        return;
    }

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    socket.emit("join-room", { room, userId: myId });

    document.getElementById("status").innerText = "Joined: " + room;

    socket.on("user-joined", async (id) => {

        const pc = createPeer(id);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        socket.emit("offer", {
            to: id,
            from: myId,
            offer
        });
    });

    socket.on("offer", async (data) => {

        const pc = createPeer(data.from);

        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("answer", {
            to: data.from,
            from: myId,
            answer
        });
    });

    socket.on("answer", async (data) => {
        if(peers[data.from]){
            await peers[data.from].setRemoteDescription(
                new RTCSessionDescription(data.answer)
            );
        }
    });

    socket.on("ice-candidate", async (data) => {
        if(peers[data.from]){
            await peers[data.from].addIceCandidate(
                new RTCIceCandidate(data.candidate)
            );
        }
    });
}

function createPeer(userId){

    const pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

    pc.ontrack = (event) => {
        const audio = document.createElement("audio");
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        document.body.appendChild(audio);
    };

    pc.onicecandidate = (event) => {
        if(event.candidate){
            socket.emit("ice-candidate", {
                to: userId,
                from: myId,
                candidate: event.candidate
            });
        }
    };

    peers[userId] = pc;
    return pc;
}

start();
</script>

</body>
</html>
