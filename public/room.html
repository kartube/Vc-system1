<!DOCTYPE html>
<html>
<head>
<title>Room</title>
</head>

<body style="background:#111;color:white;font-family:Arial">

<h2>🎧 Voice Room</h2>

<button onclick="toggleMute()" id="muteBtn">Mute</button>

<h3>👥 Users</h3>
<div id="users"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/client.js"></script>

<script>
let room = localStorage.getItem("room");
let userId = localStorage.getItem("userId");
let name = localStorage.getItem("name");

let muted = false;

function joinRoom(){
    startVoice(room, userId, name);
}

function toggleMute(){
    muted = !muted;

    document.getElementById("muteBtn").innerText =
        muted ? "Unmute" : "Mute";

    socket.emit("mute-state", {
        room,
        userId,
        muted
    });

    if(localStream){
        localStream.getAudioTracks().forEach(t => {
            t.enabled = !muted;
        });
    }
}

function renderUsers(users){
    const div = document.getElementById("users");
    div.innerHTML = "";

    Object.values(users).forEach(u => {

        const el = document.createElement("div");

        el.innerText = u.name + (u.speaking ? " 🔊" : "");

        el.style.padding = "10px";
        el.style.margin = "5px";
        el.style.background = u.speaking ? "green" : "#333";

        div.appendChild(el);
    });
}
</script>

</body>
</html>
