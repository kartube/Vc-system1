<!DOCTYPE html>
<html>
<body style="background:#111;color:white;text-align:center;font-family:Arial">

<h1>⚙️ ADMIN PANEL</h1>

<input id="target" placeholder="User ID" style="padding:10px">
<br><br>

<button onclick="ban()" style="padding:10px 20px;background:red;color:white">
BAN USER
</button>

<p id="status"></p>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

function ban(){

    const target = document.getElementById("target").value;
    const admin = localStorage.getItem("userId");

    if(!target) return alert("Enter userId");

    socket.emit("ban", { admin, target });

    document.getElementById("status").innerText =
        "User banned: " + target;
}
</script>

</body>
</html>
